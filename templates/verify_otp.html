<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="centered-layout"> 
    
    <button class="theme-toggle" id="themeBtn">🌙</button>

    <div class="login-card" style="width: 350px;">
        <h2>Check your Inbox 📩</h2>
        <p style="opacity: 0.7;">We sent a code to <b>{{ email }}</b></p>

        <form action="/verify_otp" method="POST" style="margin-top: 20px;">
            <input type="text" name="otp" placeholder="Enter 6-digit Code" required 
                   style="text-align: center; font-size: 1.5rem; letter-spacing: 5px; font-weight: bold;">
            <button type="submit" class="login-btn" style="margin-top: 15px;">Verify & Login</button>
        </form>
        <br>
        <a href="/" style="color: var(--accent-color); text-decoration: none;">← Go Back</a>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
